<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Travel Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap');

    :root {
      --ink: #1a1a2e;
      --ink2: rgba(26,26,46,0.6);
      --ink3: rgba(26,26,46,0.15);
      --paper: #f7f4ef;
      --accent: #c8692a;
      --panel-bg: rgba(247,244,239,0.96);
      --shadow: 0 8px 32px rgba(26,26,46,0.14);
      --radius: 18px;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: var(--sans); background: var(--ink); }

    .app { height: 100vh; max-height: 100vh; overflow: hidden; display: grid; grid-template-columns: 380px 1fr; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 16px 16px 20px;
      gap: 14px;
    }
    .trip-header {
      padding: 20px 20px 16px;
      background: var(--panel-bg);
      border-radius: var(--radius);
      border: 1px solid var(--ink3);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }
    .trip-title {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--ink);
      margin: 0 0 4px;
      line-height: 1.2;
    }
    .trip-subtitle { font-size: 13px; color: var(--ink2); margin: 0; line-height: 1.4; }

    .timeline-wrap {
      flex: 1;
      overflow-y: auto;
      background: var(--panel-bg);
      border-radius: var(--radius);
      border: 1px solid var(--ink3);
      box-shadow: var(--shadow);
      padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--ink3) transparent;
    }
    .stop-item {
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .stop-item:hover { background: rgba(26,26,46,0.04); }
    .stop-item.active { background: rgba(200,105,42,0.09); border-color: rgba(200,105,42,0.25); }
    .stop-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 3px; }
    .stop-name { font-weight: 600; font-size: 14px; color: var(--ink); }
    .stop-dates { font-size: 11px; color: var(--ink2); white-space: nowrap; }
    .stop-note { font-size: 12px; color: var(--ink2); line-height: 1.4; }
    .stop-divider { height: 1px; background: var(--ink3); margin: 6px 4px; }

    /* ── Map ── */
    main { position: relative; overflow: hidden; height: 100dvh; }
    #map { height: 100%; width: 100%; }

    /* ── Controls ── */
    .controls {
      position: absolute;
      top: 14px; right: 14px;
      z-index: 1000;
      width: min(340px, calc(100vw - 28px));
    }
    .ctrl-card {
      background: var(--panel-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--ink3);
      overflow: hidden;
    }

    /* Mode tabs */
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 1px solid var(--ink3);
    }
    .mode-tab {
      padding: 11px 4px;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      color: var(--ink2);
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: center;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.01em;
    }
    .mode-tab:not(:last-child) { border-right: 1px solid var(--ink3); }
    .mode-tab:hover { background: rgba(26,26,46,0.04); color: var(--ink); }
    .mode-tab.active { color: var(--accent); background: rgba(200,105,42,0.07); font-weight: 600; }

    .ctrl-body { padding: 14px; }

    /* Date nav */
    .date-nav {
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      gap: 6px;
      align-items: center;
      margin-bottom: 12px;
    }
    .arrow-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--ink3);
      background: white;
      color: var(--ink);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
      padding: 0;
    }
    .arrow-btn:hover { background: rgba(26,26,46,0.07); }

    input[type="date"] {
      width: 100%;
      padding: 8px 10px;
      font-family: var(--sans);
      font-size: 13px;
      border-radius: 10px;
      border: 1px solid var(--ink3);
      background: white;
      color: var(--ink);
      text-align: center;
    }

    /* Info */
    .info-location {
      font-family: var(--serif);
      font-size: 21px;
      color: var(--ink);
      margin: 0 0 3px;
      line-height: 1.15;
    }
    .info-meta { font-size: 12px; color: var(--ink2); margin-bottom: 8px; }
    .info-note { font-size: 13px; color: var(--ink2); line-height: 1.45; }
    .next-block {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--ink3);
    }
    .next-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 3px;
    }
    .next-name { font-weight: 600; font-size: 14px; color: var(--ink); }
    .next-dates { font-size: 12px; color: var(--ink2); }
    .no-match { font-size: 13px; color: var(--ink2); font-style: italic; line-height: 1.5; }
    .whole-info { font-size: 13px; color: var(--ink2); line-height: 1.6; }
    .whole-info strong { color: var(--ink); }

    /* Gate */
    .gate {
      position: fixed; inset: 0; z-index: 3000;
      display: none; place-items: center;
      background: rgba(26,26,46,0.85);
      backdrop-filter: blur(8px);
      padding: 16px;
    }
    .gate-card {
      width: min(420px,100%);
      background: var(--panel-bg);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .gate-card h2 { font-family: var(--serif); margin: 0 0 8px; color: var(--ink); font-size: 22px; }
    .gate-card p { margin: 0 0 16px; color: var(--ink2); font-size: 13px; line-height: 1.4; }
    .gate-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .gate-row input {
      padding: 10px 12px; font-family: var(--sans); font-size: 14px;
      border-radius: 12px; border: 1px solid var(--ink3); background: white; color: var(--ink);
    }
    .gate-row button {
      padding: 10px 18px; font-family: var(--sans); font-size: 14px; font-weight: 600;
      border-radius: 12px; border: none; cursor: pointer;
      background: var(--accent); color: white;
    }
    .gate-error { color: #b00020; font-size: 12px; margin-top: 8px; display: none; }

    /* Mobile */
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .controls { top: auto; bottom: calc(12px + env(safe-area-inset-bottom)); left: 12px; right: 12px; width: auto; }
    }

    .leaflet-popup-content-wrapper { border-radius: 12px !important; font-family: var(--sans) !important; }

    /* ══ WEATHER MODULE CSS ══ */
    .wx-section { margin-top: 12px; border-top: 1px solid var(--ink3); padding-top: 10px; }
    .wx-wrap { display: flex; flex-direction: column; gap: 6px; }
    .wx-wrap.wx-loading, .wx-wrap.wx-empty { font-size: 12px; color: var(--ink2); font-style: italic; }
    .wx-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 13px; }
    .wx-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; background: rgba(26,26,46,0.08); color: var(--ink2); border-radius: 6px; padding: 2px 7px; flex-shrink: 0; }
    .wx-badge-day { background: rgba(200,105,42,0.1); color: var(--accent); }
    .wx-emoji { font-size: 18px; line-height: 1; }
    .wx-temp { font-weight: 600; color: var(--ink); }
    .wx-desc { color: var(--ink2); }
    .wx-wind { font-size: 11px; color: var(--ink2); margin-left: auto; }
    .wx-rain { font-size: 11px; color: #2a72c8; }
    .wx-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--ink3); border-top-color: var(--accent); border-radius: 50%; animation: wx-spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
    .wx-spinner-sm { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--ink3); border-top-color: var(--accent); border-radius: 50%; animation: wx-spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes wx-spin { to { transform: rotate(360deg); } }
    .wx-all-grid { margin-top: 14px; border-top: 1px solid var(--ink3); padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .wx-all-title { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--ink2); margin-bottom: 4px; }
    .wx-all-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 13px; }
    .wx-all-name { font-weight: 600; color: var(--ink); flex-shrink: 0; }
    .wx-all-data { color: var(--ink2); text-align: right; }
    .wx-all-data b { color: var(--ink); font-weight: 600; }
    .wx-all-data span { font-size: 11px; margin-left: 4px; }
    .wx-all-na { font-size: 11px; color: var(--ink2); font-style: italic; }
    .wx-compact { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink2); margin-top: 3px; }
    .wx-temp-sm { font-weight: 600; color: var(--ink); }
    .wx-desc-sm { font-size: 11px; }
    #tab-all.active ~ * .wx-section, #tab-all.active ~ * .wx-all-grid { display: none !important; }

    /* ══ SPECIES LIST MODULE CSS ══ */

    /* Species button — sits inline in the info header row */
    .species-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(200,105,42,0.35);
      background: rgba(200,105,42,0.08);
      color: var(--accent);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .species-btn:hover {
      background: rgba(200,105,42,0.16);
      border-color: rgba(200,105,42,0.55);
    }
    .species-btn svg {
      flex-shrink: 0;
    }
    .species-btn-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 3px;
    }

    /* Species modal overlay */
    .species-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 4000;
      display: none;
      place-items: center;
      background: rgba(26,26,46,0.72);
      backdrop-filter: blur(6px);
      padding: 16px;
    }
    .species-modal-overlay.open {
      display: grid;
    }

    /* Modal card */
    .species-modal {
      width: min(480px, 100%);
      max-height: min(80vh, 640px);
      background: var(--panel-bg);
      border-radius: 22px;
      box-shadow: 0 24px 64px rgba(26,26,46,0.28);
      border: 1px solid var(--ink3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: species-in 0.22s cubic-bezier(0.34,1.3,0.64,1) both;
    }
    @keyframes species-in {
      from { opacity: 0; transform: scale(0.93) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Modal header */
    .species-modal-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--ink3);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .species-modal-title {
      font-family: var(--serif);
      font-size: 20px;
      color: var(--ink);
      margin: 0 0 2px;
      line-height: 1.2;
    }
    .species-modal-subtitle {
      font-size: 12px;
      color: var(--ink2);
      margin: 0;
    }
    .species-close-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--ink3);
      background: white;
      color: var(--ink2);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
      line-height: 1;
    }
    .species-close-btn:hover { background: var(--ink); color: white; }

    /* Modal body — scrollable */
    .species-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--ink3) transparent;
    }

    /* Empty state */
    .species-empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--ink2);
      font-size: 13px;
      font-style: italic;
    }
    .species-empty-icon {
      font-size: 36px;
      margin-bottom: 10px;
      display: block;
      opacity: 0.5;
    }

    /* Count badge in header */
    .species-count-badge {
      display: inline-block;
      background: rgba(200,105,42,0.12);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Individual species card */
    .species-card {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--ink3);
      background: white;
      margin-bottom: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .species-card:last-child { margin-bottom: 0; }
    .species-card:hover {
      border-color: rgba(200,105,42,0.3);
      box-shadow: 0 2px 12px rgba(200,105,42,0.08);
    }

    .species-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }
    .species-card-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
      font-style: italic;
    }
    .species-card-date {
      font-size: 11px;
      color: var(--ink2);
      white-space: nowrap;
      flex-shrink: 0;
      background: rgba(26,26,46,0.06);
      border-radius: 6px;
      padding: 2px 7px;
    }
    .species-card-location {
      font-size: 12px;
      color: var(--ink2);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .species-card-desc {
      font-size: 12px;
      color: var(--ink2);
      line-height: 1.45;
      border-top: 1px solid var(--ink3);
      padding-top: 6px;
      margin-top: 4px;
    }

    /* Stop group header (whole trip view) */
    .species-stop-group {
      margin-bottom: 16px;
    }
    .species-stop-group-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    /* species classification filter */
    .species-icon {
  display: inline-block;
  flex-shrink: 0;
  background-color: var(--accent);
  -webkit-mask-size: contain;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-position: center;
  mask-position: center;
}
.species-card-name-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.species-card-name-wrap .species-icon { width: 15px; height: 15px; }

.species-filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 10px 20px 14px;
  border-bottom: 1px solid var(--ink3);
  flex-shrink: 0;
}
.species-filter-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--ink3);
  background: white;
  cursor: pointer;
  padding: 0;
  transition: background 0.15s, border-color 0.15s;
}
.species-filter-btn:hover { background: rgba(200,105,42,0.1); }
.species-filter-btn.active { background: rgba(200,105,42,0.16); border-color: rgba(200,105,42,0.55); }
.species-filter-btn .species-icon { width: 16px; height: 16px; }
.species-filter-btn.all-btn { font-size: 10px; font-weight: 700; color: var(--ink2); }
.species-filter-btn.active.all-btn { color: var(--accent); }
  </style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <h2>Private map</h2>
    <p>Enter the passcode to view.</p>
    <div class="gate-row">
      <input id="gateInput" type="password" placeholder="Passcode" />
      <button id="gateBtn">Unlock</button>
    </div>
    <div class="gate-error" id="gateError">Incorrect passcode.</div>
  </div>
</div>

<!-- ══ SPECIES MODAL ══ -->
<div class="species-modal-overlay" id="speciesModalOverlay">
  <div class="species-modal" role="dialog" aria-modal="true" aria-labelledby="speciesModalTitle">
    <div class="species-modal-header">
    </div>
    <div class="species-filter-bar" id="speciesFilterBar"></div>
    <div class="species-modal-body" id="speciesModalBody"></div>
      <div>
        <p class="species-modal-title" id="speciesModalTitle">Species List</p>
        <p class="species-modal-subtitle" id="speciesModalSubtitle"></p>
      </div>
      <button class="species-close-btn" id="speciesCloseBtn" aria-label="Close">✕</button>
    </div>
    <div class="species-modal-body" id="speciesModalBody"></div>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="trip-header">
      <p class="trip-title" id="tripTitle">Our Travels</p>
      <p class="trip-subtitle" id="tripSubtitle">Loading…</p>
    </div>
    <div class="timeline-wrap" id="timeline"></div>
  </aside>

  <main>
    <div id="map"></div>
    <div class="controls">
      <div class="ctrl-card">
        <div class="mode-tabs">
          <button class="mode-tab" id="tab-today"  onclick="setMode('today')">Today</button>
          <button class="mode-tab" id="tab-select" onclick="setMode('select')">Select date</button>
          <button class="mode-tab" id="tab-all"    onclick="setMode('all')">Whole trip</button>
        </div>
        <div class="ctrl-body" id="ctrlBody"></div>
      </div>
    </div>
  </main>
</div>

<script>
  /***********************************************************************
   * CONFIG — edit these
   ***********************************************************************/
  const PASSCODE = "";
  const ITINERARY_JSON_URL = "itinerary.json";
  const SPECIES_JSON_URL   = "speciesList.json";

  const EMBEDDED_ITINERARY = {
    title: "Leah & Co. — 2026 Adventure",
    subtitle: "Following the sun ✈️",
    stops: [
      { id: "london",    name: "London",    country: "UK",       start: "2026-03-01", end: "2026-03-14", lat: 51.5074,  lng: -0.1278,  note: "Base camp before the adventure begins." },
      { id: "lisbon",    name: "Lisbon",    country: "Portugal", start: "2026-03-15", end: "2026-03-22", lat: 38.7169,  lng: -9.1399,  note: "Pastéis de nata every morning." },
      { id: "seville",   name: "Seville",   country: "Spain",    start: "2026-03-23", end: "2026-03-30", lat: 37.3891,  lng: -5.9845,  note: "Flamenco and orange trees." },
      { id: "marrakech", name: "Marrakech", country: "Morocco",  start: "2026-03-31", end: null,          lat: 31.6295,  lng: -7.9811,  note: "The medina awaits." }
    ]
  };

  // Fallback embedded species (mirrors speciesList.json)
  const EMBEDDED_SPECIES = {
    species: [
      { id: 100, name: "Austral Thrush",       dateSpotted: "2026-05-23", location: "Sanctuario el Cañi",       description: null },
      { id: 200, name: "Magellanic Woodpecker", dateSpotted: "2026-05-27", location: "Conguillio National Park", description: "Commonly called Carpenteros Negro/Gigante" },
      { id: 300, name: "Andean Condor",         dateSpotted: "2026-05-27", location: "Conguillio National Park", description: null }
    ]
  };

  /***********************************************************************
   * UTILITIES
   ***********************************************************************/
  function parseDateUTC(s) {
    const [y, m, d] = s.split("-").map(Number);
    return new Date(Date.UTC(y, m - 1, d));
  }
  function todayUTC() {
    const n = new Date();
    return new Date(Date.UTC(n.getFullYear(), n.getMonth(), n.getDate()));
  }
  function toYMD(d) {
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  }
  function todayStr() { return toYMD(todayUTC()); }
  function fmtDate(s) {
    if (!s) return "onwards";
    return parseDateUTC(s).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric", timeZone:"UTC" });
  }
  function fmtDateShort(s) {
    // e.g. "27 May"
    return parseDateUTC(s).toLocaleDateString("en-GB", { day:"numeric", month:"short", timeZone:"UTC" });
  }
  function fmtRange(s, e) {
    return e ? `${fmtDate(s)} → ${fmtDate(e)}` : `From ${fmtDate(s)}`;
  }
  function esc(str) {
      return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
  }

  function stopForDate(dateStr) {
    const t = parseDateUTC(dateStr).getTime();
    for (let i = 0; i < stops.length; i++) {
      const s = stops[i];
      const start = parseDateUTC(s.start).getTime();
      let end;
      if (s.end) {
        end = parseDateUTC(s.end).getTime();
      } else {
        const next = stops[i + 1];
        end = next ? parseDateUTC(next.start).getTime() - 1 : Infinity;
      }
      if (t >= start && t <= end) return s;
    }
    return null;
  }

  function nextStopAfter(stop) {
    if (!stop) return stops[0] || null;
    const idx = stops.findIndex(s => s.id === stop.id);
    return stops[idx + 1] || null;
  }

  function tripBounds() {
    if (!stops.length) return null;
    const first = stops[0];
    const last  = stops[stops.length - 1];
    const minD  = parseDateUTC(first.start);
    const maxD  = last.end
      ? parseDateUTC(last.end)
      : new Date(parseDateUTC(last.start).getTime() + 365*24*60*60*1000);
    return { min: minD, max: maxD };
  }

  function todayInTrip() {
    const b = tripBounds();
    if (!b) return false;
    const t = todayUTC().getTime();
    return t >= b.min.getTime() && t <= b.max.getTime();
  }

  /***********************************************************************
   * STATE
   ***********************************************************************/
  let itinerary = null;
  let stops = [];
  let allSpecies = [];
  let mode = "today";
  let selectedDate = todayStr();
  let map = null;
  let markersById = new Map();
  let routeLine = null;

  /***********************************************************************
   * DATA LOADING
   ***********************************************************************/
  async function loadItinerary() {
    try {
      if (!ITINERARY_JSON_URL) throw 0;
      const res = await fetch(ITINERARY_JSON_URL, { cache: "no-store" });
      if (!res.ok) throw 0;
      const json = await res.json();
      if (!json || !Array.isArray(json.stops)) throw 0;
      return json;
    } catch { return EMBEDDED_ITINERARY; }
  }

  async function loadSpecies() {
    try {
      const res = await fetch(SPECIES_JSON_URL, { cache: "no-store" });
      if (!res.ok) throw 0;
      const json = await res.json();
      if (!json || !Array.isArray(json.species)) throw 0;
      return json.species;
    } catch { return EMBEDDED_SPECIES.species; }
  }

  /***********************************************************************
   * SPECIES — helpers
   ***********************************************************************/

  /**
   * Return the effective end date string for a stop.
   * If the stop has no end date, use the day before the next stop starts,
   * or far future if it is the last stop.
   */
  function stopEffectiveEnd(stop) {
    if (stop.end) return stop.end;
    const idx = stops.findIndex(s => s.id === stop.id);
    const next = stops[idx + 1];
    if (next) {
      const d = parseDateUTC(next.start);
      d.setUTCDate(d.getUTCDate() - 1);
      return toYMD(d);
    }
    return "9999-12-31";
  }

  /**
   * Return species whose dateSpotted falls within a stop's date range.
   * Species are sorted by dateSpotted ascending.
   */
  function speciesForStop(stop) {
    const start = stop.start;
    const end   = stopEffectiveEnd(stop);
    return allSpecies
      .filter(sp => sp.dateSpotted >= start && sp.dateSpotted <= end)
      .sort((a, b) => a.dateSpotted.localeCompare(b.dateSpotted));
  }

  /** Render a single species card element */
  function buildSpeciesCard(sp) {
  const card = document.createElement("div");
  card.className = "species-card";

  const top = document.createElement("div");
  top.className = "species-card-top";

  const nameWrap = document.createElement("div");
  nameWrap.className = "species-card-name-wrap";
  if (sp.group) nameWrap.appendChild(makeGroupIconEl(sp.group));
  const name = document.createElement("span");
  name.className = "species-card-name";
  name.textContent = sp.name;
  nameWrap.appendChild(name);

  const dateBadge = document.createElement("span");
  dateBadge.className = "species-card-date";
  dateBadge.textContent = fmtDateShort(sp.dateSpotted);

  top.appendChild(nameWrap);
  top.appendChild(dateBadge);
  card.appendChild(top);

  if (sp.location) {
    const loc = document.createElement("div");
    loc.className = "species-card-location";
    loc.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${esc(sp.location)}`;
    card.appendChild(loc);
  }
  if (sp.description) {
    const desc = document.createElement("div");
    desc.className = "species-card-desc";
    desc.textContent = sp.description;
    card.appendChild(desc);
  }
  return card;
  }

   * SPECIES MODAL

function openSpeciesModal(stop, stopName, isWholeTrip) {
  modalContext = isWholeTrip ? { type: "all" } : { type: "stop", stop, stopName };
  activeGroupFilter = null;
  renderSpeciesFilterBar();
  renderSpeciesModalBody();
  document.getElementById("speciesModalOverlay").classList.add("open");
}

function renderSpeciesFilterBar() {
  const bar = document.getElementById("speciesFilterBar");
  bar.innerHTML = "";

  const pool = modalContext.type === "all"
    ? allSpecies
    : speciesForStop(modalContext.stop);
  const groupsPresent = [...new Set(pool.map(sp => sp.group).filter(Boolean))];

  const allBtn = document.createElement("button");
  allBtn.className = "species-filter-btn all-btn" + (activeGroupFilter === null ? " active" : "");
  allBtn.textContent = "ALL";
  allBtn.title = "All groups";
  allBtn.onclick = () => { activeGroupFilter = null; renderSpeciesFilterBar(); renderSpeciesModalBody(); };
  bar.appendChild(allBtn);

  groupsPresent.forEach(group => {
    const btn = document.createElement("button");
    btn.className = "species-filter-btn" + (activeGroupFilter === group ? " active" : "");
    btn.title = GROUP_LABELS[group] || group;
    btn.appendChild(makeGroupIconEl(group));
    btn.onclick = () => { activeGroupFilter = group; renderSpeciesFilterBar(); renderSpeciesModalBody(); };
    bar.appendChild(btn);
  });
}

function renderSpeciesModalBody() {
  const title = document.getElementById("speciesModalTitle");
  const subtitle = document.getElementById("speciesModalSubtitle");
  const body = document.getElementById("speciesModalBody");
  body.innerHTML = "";

  const applyFilter = list => activeGroupFilter
    ? list.filter(sp => sp.group === activeGroupFilter)
    : list;

  if (modalContext.type === "all") {
    const shown = applyFilter(allSpecies);
    title.innerHTML = `Whole Trip Species <span class="species-count-badge">${shown.length}</span>`;
    subtitle.textContent = "All species spotted so far";

    if (!shown.length) { body.appendChild(emptyState()); return; }

    const grouped = new Map();
    for (const stop of stops) {
      const sps = applyFilter(speciesForStop(stop));
      if (sps.length) grouped.set(stop, sps);
    }
    const matchedIds = new Set([...grouped.values()].flat().map(sp => sp.id));
    const unknownSps = shown.filter(sp => !matchedIds.has(sp.id))
                             .sort((a,b) => a.dateSpotted.localeCompare(b.dateSpotted));

    grouped.forEach((sps, stop) => {
      const group = document.createElement("div");
      group.className = "species-stop-group";
      const gt = document.createElement("div");
      gt.className = "species-stop-group-title";
      gt.textContent = `${stop.name}${stop.country ? `, ${stop.country}` : ""} — ${sps.length} species`;
      group.appendChild(gt);
      sps.forEach(sp => group.appendChild(buildSpeciesCard(sp)));
      body.appendChild(group);
    });

    if (unknownSps.length) {
      const group = document.createElement("div");
      group.className = "species-stop-group";
      const gt = document.createElement("div");
      gt.className = "species-stop-group-title";
      gt.textContent = `Other — ${unknownSps.length} species`;
      group.appendChild(gt);
      unknownSps.forEach(sp => group.appendChild(buildSpeciesCard(sp)));
      body.appendChild(group);
    }
  } else {
    const sps = applyFilter(speciesForStop(modalContext.stop));
    title.innerHTML = `${esc(modalContext.stopName)} <span class="species-count-badge">${sps.length}</span>`;
    subtitle.textContent = sps.length ? `${sps.length} species recorded at this stop` : "No species recorded yet";
    if (!sps.length) { body.appendChild(emptyState()); return; }
    sps.forEach(sp => body.appendChild(buildSpeciesCard(sp)));
  }
}

  }

    document.getElementById("speciesModalOverlay").classList.remove("open");
  }
const GROUP_ICONS = {
  fish:         "icons/fishSil.png",

const GROUP_LABELS = {

let modalContext = null;      // { type:'stop', stop } or { type:'all' }
let activeGroupFilter = null; // null = show all groups

function makeGroupIconEl(group, size) {

  /***********************************************************************
   * GATE
   ***********************************************************************/
  function setupGate() {
    if (!PASSCODE) return;
    const gate = document.getElementById("gate");
    gate.style.display = "grid";
    const inp = document.getElementById("gateInput");
    const btn = document.getElementById("gateBtn");
    const err = document.getElementById("gateError");
    const unlock = () => {
      if (inp.value === PASSCODE) gate.style.display = "none";
      else err.style.display = "block";
    };
    btn.addEventListener("click", unlock);
    inp.addEventListener("keydown", e => e.key === "Enter" && unlock());
  }

  /***********************************************************************
   * MAP
   ***********************************************************************/
  function initMap() {
    map = L.map("map", { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);
  }

  function buildPins() {
    markersById.forEach(m => m.remove());
    markersById.clear();
    if (routeLine) { routeLine.remove(); routeLine = null; }

    const latlngs = [];
    const used = new Set();
    for (const stop of stops) {
      const ll = [stop.lat, stop.lng];
      latlngs.push(ll);
      const marker = L.marker(ll).addTo(map);
      marker.on("click", () => {
        if (mode === "all") return;
        selectedDate = stop.start;
        setMode("select");
      });
      marker.bindPopup(popupHtml(stop), { closeButton: true });
      markersById.set(stop.id, marker);
      const key = `${stop.lat.toFixed(5)},${stop.lng.toFixed(5)}`;
      if (used.has(key)) {
        const j = 0.005 * (Math.random() - 0.5);
        marker.setLatLng([stop.lat + j, stop.lng + j]);
      }
      used.add(key);
    }
    routeLine = L.polyline(latlngs, { weight: 2.5, opacity: 0.6, color: "#c8692a" }).addTo(map);
  }

  function popupHtml(stop) {
    const note = stop.note ? `<div style="margin-top:5px;font-size:12px;opacity:.8;">${esc(stop.note)}</div>` : "";
    return `<div style="font-family:'DM Sans',system-ui;min-width:150px;">
      <div style="font-weight:700;font-size:14px;">${esc(stop.name)}${stop.country ? `<span style="font-weight:400;opacity:.7;">, ${esc(stop.country)}</span>` : ""}</div>
      <div style="font-size:12px;opacity:.65;margin-top:2px;">${fmtRange(stop.start, stop.end)}</div>
      ${note}
    </div>`;
  }

  function focusAll() {
    const group = L.featureGroup([...markersById.values()]);
    if (!group.getLayers().length) return;
    map.fitBounds(group.getBounds().pad(0.25));
  }

  function focusStop(stop) {
    const m = markersById.get(stop.id);
    if (!m) return;
    map.flyTo(m.getLatLng(), 9, { duration: 0.9 });
    if (window.innerWidth > 860) m.openPopup();
  }

  /** Build a species button for a given stop (or whole-trip if stopId is null) */

    const count = isWholeTrip
      ? allSpecies.length
      : speciesForStop(stop).length;

    const btn = document.createElement("button");
    btn.className = "species-btn";
    btn.title = "View species list";
    btn.innerHTML = `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      Species${count > 0 ? ` (${count})` : ""}`;

    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isWholeTrip) {
        openSpeciesModal(null, null, true);

  function renderCtrl() {
    const body = document.getElementById("ctrlBody");
    body.innerHTML = "";

    // Update tabs
    document.getElementById("tab-today").classList.toggle("active", mode === "today");
    document.getElementById("tab-select").classList.toggle("active", mode === "select");
    document.getElementById("tab-all").classList.toggle("active", mode === "all");

    if (mode === "all") {
      renderAll(body);
      renderTimeline(null);
      focusAll();
      return;
    }

    const dateToUse = mode === "today" ? todayStr() : selectedDate;
    const stop = stopForDate(dateToUse);

    if (mode === "select") {
      const b = tripBounds();
      const nav = document.createElement("div");
      nav.className = "date-nav";

      const prev = document.createElement("button");
      prev.className = "arrow-btn";
      prev.textContent = "‹";
      prev.onclick = () => {
        const d = parseDateUTC(selectedDate);
        d.setUTCDate(d.getUTCDate() - 1);
        selectedDate = toYMD(d);
        renderCtrl();
      };

      const inp = document.createElement("input");
      inp.type = "date";
      inp.value = selectedDate;
      if (b) {
        inp.min = toYMD(b.min);
        inp.max = toYMD(b.max);
      }
      inp.oninput = () => { if (inp.value) { selectedDate = inp.value; renderCtrl(); } };

      const next = document.createElement("button");
      next.className = "arrow-btn";
      next.textContent = "›";
      next.onclick = () => {
        const d = parseDateUTC(selectedDate);
        d.setUTCDate(d.getUTCDate() + 1);
        selectedDate = toYMD(d);
        renderCtrl();
      };

      nav.appendChild(prev);
      nav.appendChild(inp);
      nav.appendChild(next);
      body.appendChild(nav);
    }

    if (stop) {
      // Location row with species button
      const headerWrap = document.createElement("div");
      headerWrap.className = "species-btn-wrap";

      const locTitle = document.createElement("p");
      locTitle.className = "info-location";
      locTitle.style.margin = "0";
      locTitle.textContent = `${stop.name}${stop.country ? `, ${stop.country}` : ""}`;

      const spBtn = buildSpeciesBtn(stop, false);

      headerWrap.appendChild(locTitle);
      headerWrap.appendChild(spBtn);
      body.appendChild(headerWrap);

      const meta = document.createElement("p");
      meta.className = "info-meta";
      meta.textContent = fmtRange(stop.start, stop.end);
      body.appendChild(meta);

      if (stop.note) {
        const note = document.createElement("p");
        note.className = "info-note";
        note.textContent = stop.note;
        body.appendChild(note);
      }

      renderWeather(stop, body);

      const next = nextStopAfter(stop);
      if (next) {
        const nb = document.createElement("div");
        nb.className = "next-block";
        nb.innerHTML = `<div class="next-label">Next stop</div>
          <div class="next-name">${esc(next.name)}${next.country ? `, <span style="font-weight:400;">${esc(next.country)}</span>` : ""}</div>
          <div class="next-dates">${fmtRange(next.start, next.end)}</div>`;

      }

      focusStop(stop);

    } else {

      p.className = "no-match";
      p.textContent = "No stop scheduled for this date.";
      body.appendChild(p);
      renderTimeline(null);
    }
  }

  /***********************************************************************
   * WEATHER MODULE
   * Uses Open-Meteo (free, no API key). Shows:
   *   • Today/upcoming days if the stop is current or future
   *   • A note that weather data isn't available for past stops
   ***********************************************************************/
  const WX_CACHE = new Map(); // key → { ts, data }
  const WX_TTL   = 10 * 60 * 1000; // 10-minute cache

  const WMO_ICONS = {
    0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
    45:"🌫️",48:"🌫️",
    51:"🌦️",53:"🌦️",55:"🌧️",
    61:"🌧️",63:"🌧️",65:"🌧️",
    71:"🌨️",73:"🌨️",75:"❄️",
    77:"🌨️",
    80:"🌦️",81:"🌧️",82:"⛈️",
    85:"🌨️",86:"❄️",
    95:"⛈️",96:"⛈️",99:"⛈️"
  };
  const WMO_DESC = {
    0:"Clear",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
    45:"Fog",48:"Icy fog",
    51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",
    61:"Light rain",63:"Rain",65:"Heavy rain",
    71:"Light snow",73:"Snow",75:"Heavy snow",
    77:"Snow grains",
    80:"Showers",81:"Rain showers",82:"Violent showers",
    85:"Snow showers",86:"Heavy snow showers",
    95:"Thunderstorm",96:"Thunderstorm w/ hail",99:"Heavy thunderstorm"
  };

  async function fetchWeather(lat, lng) {
    const key = `${lat.toFixed(3)},${lng.toFixed(3)}`;
    const cached = WX_CACHE.get(key);
    if (cached && Date.now() - cached.ts < WX_TTL) return cached.data;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
      `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max` +
      `&current_weather=true&timezone=auto&forecast_days=5`;

    const res  = await fetch(url);
    if (!res.ok) throw new Error("Weather fetch failed");
    const data = await res.json();
    WX_CACHE.set(key, { ts: Date.now(), data });
    return data;
  }

  function wxRow(code, tMax, tMin, precip, wind, label, isToday) {
    const emoji = WMO_ICONS[code] ?? "🌡️";
    const desc  = WMO_DESC[code]  ?? "";
    const badge = isToday
      ? `<span class="wx-badge wx-badge-day">${label}</span>`
      : `<span class="wx-badge">${label}</span>`;
    const rainEl = precip > 0
      ? `<span class="wx-rain">💧${precip.toFixed(1)}mm</span>` : "";
    return `
      <div class="wx-row">
        ${badge}
        <span class="wx-emoji">${emoji}</span>
        <span class="wx-temp">${Math.round(tMax)}° <span style="font-weight:400;color:var(--ink2);">/ ${Math.round(tMin)}°</span></span>
        <span class="wx-desc">${desc}</span>
        ${rainEl}
        <span class="wx-wind">💨${Math.round(wind)} km/h</span>
      </div>`;
  }

  function renderWeather(stop, body) {
    const section = document.createElement("div");
    section.className = "wx-section";

    const wrap = document.createElement("div");
    wrap.className = "wx-wrap wx-loading";
    wrap.innerHTML = `<span class="wx-spinner"></span>Loading weather…`;
    section.appendChild(wrap);
    body.appendChild(section);

    const today     = todayUTC();
    const stopStart = parseDateUTC(stop.start);
    const stopEnd   = stop.end ? parseDateUTC(stop.end) : null;

    // If the stop ended in the past, show a note instead
    if (stopEnd && stopEnd < today) {
      wrap.className = "wx-wrap wx-empty";
      wrap.innerHTML = "Weather unavailable for past stops.";
      return;
    }

    fetchWeather(stop.lat, stop.lng)
      .then(data => {
        const daily  = data.daily;
        const dates  = daily.time;            // ["2026-06-15", …]
        const todayS = todayStr();

        // Show up to 5 days that overlap with the stop's stay
        const rows = [];
        for (let i = 0; i < dates.length; i++) {
          const d = dates[i];
          // Only show days within the stop's range (or from today if already there)
          if (stopEnd && d > toYMD(stopEnd)) continue;
          if (d < todayS) continue;

          const isToday = (d === todayS);
          const dt = parseDateUTC(d);
          const label = isToday ? "Today"
            : dt.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short", timeZone:"UTC" });

          rows.push(wxRow(
            daily.weathercode[i],
            daily.temperature_2m_max[i],
            daily.temperature_2m_min[i],
            daily.precipitation_sum[i] ?? 0,
            daily.windspeed_10m_max[i] ?? 0,
            label,
            isToday
          ));
          if (rows.length >= 4) break;
        }

        if (!rows.length) {
          wrap.className = "wx-wrap wx-empty";
          wrap.innerHTML = "No forecast available for these dates.";
        } else {
          wrap.className = "wx-wrap";
          wrap.innerHTML = rows.join("");
        }
      })
      .catch(() => {
        wrap.className = "wx-wrap wx-empty";
        wrap.innerHTML = "Weather unavailable right now.";
      });
  }

  function renderAll(body) {
    const info = document.createElement("div");
    info.className = "whole-info";

    const n = stops.length;
    const countries = [...new Set(stops.map(s => s.country).filter(Boolean))];
    const first = stops[0];
    const last  = stops[stops.length - 1];
    info.innerHTML = `
      <strong>${n} stops</strong> across <strong>${countries.length || "–"}</strong> countr${countries.length === 1 ? "y" : "ies"}.<br>
      From <strong>${fmtDate(first?.start)}</strong>${last?.end ? ` to <strong>${fmtDate(last.end)}</strong>` : ""}.
    `;
    body.appendChild(info);

    // Whole-trip species button
    const spBtnWrap = document.createElement("div");
    spBtnWrap.style.cssText = "margin-top:12px; display:flex; justify-content:flex-end;";
    spBtnWrap.appendChild(buildSpeciesBtn(null, true));
    body.appendChild(spBtnWrap);
  }

  /***********************************************************************
   * MODE
   ***********************************************************************/
  function setMode(m) {
    mode = m;
    if (m === "today") selectedDate = todayStr();
    renderCtrl();
  }

  /***********************************************************************
   * INIT
   ***********************************************************************/
  async function init() {
    setupGate();
    initMap();

    const [it, species] = await Promise.all([loadItinerary(), loadSpecies()]);
    itinerary  = it;
    stops      = it.stops;
    allSpecies = species;

    document.getElementById("tripTitle").textContent    = it.title    || "Our Travels";
    document.getElementById("tripSubtitle").textContent = it.subtitle || "";

    buildPins();

    // Determine initial mode
    if (todayInTrip()) {
      mode = "today";
    } else {
      const b = tripBounds();
      if (b && todayUTC() > b.max) {
        mode = "all";
      } else {
        mode = "today";
        if (stops.length) selectedDate = stops[0].start;
      }
    }

    renderCtrl();

    // Modal close handlers
    document.getElementById("speciesCloseBtn").addEventListener("click", closeSpeciesModal);
    document.getElementById("speciesModalOverlay").addEventListener("click", (e) => {
      if (e.target === document.getElementById("speciesModalOverlay")) closeSpeciesModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeSpeciesModal();
    });
  }

  init();
</script>
</body>
</html>
