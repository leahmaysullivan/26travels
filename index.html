<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Travel Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap');

    :root {
      --ink: #1a1a2e;
      --ink2: rgba(26,26,46,0.6);
      --ink3: rgba(26,26,46,0.15);
      --paper: #f7f4ef;
      --accent: #c8692a;
      --panel-bg: rgba(247,244,239,0.96);
      --shadow: 0 8px 32px rgba(26,26,46,0.14);
      --radius: 18px;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: var(--sans); background: var(--ink); }

    .app { height: 100vh; max-height: 100vh; overflow: hidden; display: grid; grid-template-columns: 380px 1fr; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 16px 16px 20px;
      gap: 14px;
    }
    .trip-header {
      padding: 20px 20px 16px;
      background: var(--panel-bg);
      border-radius: var(--radius);
      border: 1px solid var(--ink3);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }
    .trip-title {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--ink);
      margin: 0 0 4px;
      line-height: 1.2;
    }
    .trip-subtitle { font-size: 13px; color: var(--ink2); margin: 0; line-height: 1.4; }

    .timeline-wrap {
      flex: 1;
      overflow-y: auto;
      background: var(--panel-bg);
      border-radius: var(--radius);
      border: 1px solid var(--ink3);
      box-shadow: var(--shadow);
      padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--ink3) transparent;
    }
    .stop-item {
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .stop-item:hover { background: rgba(26,26,46,0.04); }
    .stop-item.active { background: rgba(200,105,42,0.09); border-color: rgba(200,105,42,0.25); }
    .stop-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 3px; }
    .stop-name { font-weight: 600; font-size: 14px; color: var(--ink); }
    .stop-dates { font-size: 11px; color: var(--ink2); white-space: nowrap; }
    .stop-note { font-size: 12px; color: var(--ink2); line-height: 1.4; }
    .stop-divider { height: 1px; background: var(--ink3); margin: 6px 4px; }

    /* ── Map ── */
    main { position: relative; overflow: hidden; height: 100dvh; }
#map { height: 100%; width: 100%; }

    /* ── Controls ── */
    .controls {
      position: absolute;
      top: 14px; right: 14px;
      z-index: 1000;
      width: min(340px, calc(100vw - 28px));
    }
    .ctrl-card {
      background: var(--panel-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--ink3);
      overflow: hidden;
    }

    /* Mode tabs */
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 1px solid var(--ink3);
    }
    .mode-tab {
      padding: 11px 4px;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      color: var(--ink2);
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: center;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.01em;
    }
    .mode-tab:not(:last-child) { border-right: 1px solid var(--ink3); }
    .mode-tab:hover { background: rgba(26,26,46,0.04); color: var(--ink); }
    .mode-tab.active { color: var(--accent); background: rgba(200,105,42,0.07); font-weight: 600; }

    .ctrl-body { padding: 14px; }

    /* Date nav */
    .date-nav {
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      gap: 6px;
      align-items: center;
      margin-bottom: 12px;
    }
    .arrow-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--ink3);
      background: white;
      color: var(--ink);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
      padding: 0;
    }
    .arrow-btn:hover { background: rgba(26,26,46,0.07); }

    input[type="date"] {
      width: 100%;
      padding: 8px 10px;
      font-family: var(--sans);
      font-size: 13px;
      border-radius: 10px;
      border: 1px solid var(--ink3);
      background: white;
      color: var(--ink);
      text-align: center;
    }

    /* Info */
    .info-location {
      font-family: var(--serif);
      font-size: 21px;
      color: var(--ink);
      margin: 0 0 3px;
      line-height: 1.15;
    }
    .info-meta { font-size: 12px; color: var(--ink2); margin-bottom: 8px; }
    .info-note { font-size: 13px; color: var(--ink2); line-height: 1.45; }
    .next-block {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--ink3);
    }
    .next-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 3px;
    }
    .next-name { font-weight: 600; font-size: 14px; color: var(--ink); }
    .next-dates { font-size: 12px; color: var(--ink2); }
    .no-match { font-size: 13px; color: var(--ink2); font-style: italic; line-height: 1.5; }
    .whole-info { font-size: 13px; color: var(--ink2); line-height: 1.6; }
    .whole-info strong { color: var(--ink); }

    /* Gate */
    .gate {
      position: fixed; inset: 0; z-index: 3000;
      display: none; place-items: center;
      background: rgba(26,26,46,0.85);
      backdrop-filter: blur(8px);
      padding: 16px;
    }
    .gate-card {
      width: min(420px,100%);
      background: var(--panel-bg);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .gate-card h2 { font-family: var(--serif); margin: 0 0 8px; color: var(--ink); font-size: 22px; }
    .gate-card p { margin: 0 0 16px; color: var(--ink2); font-size: 13px; line-height: 1.4; }
    .gate-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .gate-row input {
      padding: 10px 12px; font-family: var(--sans); font-size: 14px;
      border-radius: 12px; border: 1px solid var(--ink3); background: white; color: var(--ink);
    }
    .gate-row button {
      padding: 10px 18px; font-family: var(--sans); font-size: 14px; font-weight: 600;
      border-radius: 12px; border: none; cursor: pointer;
      background: var(--accent); color: white;
    }
    .gate-error { color: #b00020; font-size: 12px; margin-top: 8px; display: none; }

    /* Mobile */
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .controls { top: auto; bottom: calc(12px + env(safe-area-inset-bottom)); left: 12px; right: 12px; width: auto; }
    }

    .leaflet-popup-content-wrapper { border-radius: 12px !important; font-family: var(--sans) !important; }

/* ══════════════════════════════════════════
   WEATHER MODULE CSS
   Paste this block inside your existing <style> tag
   ══════════════════════════════════════════ */

/* ── Weather section wrapper ── */
.wx-section {
  margin-top: 12px;
  border-top: 1px solid var(--ink3);
  padding-top: 10px;
}

.wx-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.wx-wrap.wx-loading,
.wx-wrap.wx-empty {
  font-size: 12px;
  color: var(--ink2);
  font-style: italic;
}

/* ── Individual weather row (Now / Arrival day) ── */
.wx-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  font-size: 13px;
}

.wx-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  background: rgba(26,26,46,0.08);
  color: var(--ink2);
  border-radius: 6px;
  padding: 2px 7px;
  flex-shrink: 0;
}

.wx-badge-day {
  background: rgba(200,105,42,0.1);
  color: var(--accent);
}

.wx-emoji  { font-size: 18px; line-height: 1; }
.wx-temp   { font-weight: 600; color: var(--ink); }
.wx-desc   { color: var(--ink2); }
.wx-wind   { font-size: 11px; color: var(--ink2); margin-left: auto; }
.wx-rain   { font-size: 11px; color: #2a72c8; }

/* ── Spinner ── */
.wx-spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid var(--ink3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: wx-spin 0.7s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}

.wx-spinner-sm {
  display: inline-block;
  width: 10px; height: 10px;
  border: 1.5px solid var(--ink3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: wx-spin 0.7s linear infinite;
  vertical-align: middle;
}

@keyframes wx-spin {
  to { transform: rotate(360deg); }
}

/* ── "Whole trip" weather grid ── */
.wx-all-grid {
  margin-top: 14px;
  border-top: 1px solid var(--ink3);
  padding-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.wx-all-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--ink2);
  margin-bottom: 4px;
}

.wx-all-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 13px;
}

.wx-all-name {
  font-weight: 600;
  color: var(--ink);
  flex-shrink: 0;
}

.wx-all-data {
  color: var(--ink2);
  text-align: right;
}

.wx-all-data b {
  color: var(--ink);
  font-weight: 600;
}

.wx-all-data span {
  font-size: 11px;
  margin-left: 4px;
}

.wx-all-na {
  font-size: 11px;
  color: var(--ink2);
  font-style: italic;
}

/* ── Compact inline weather (sidebar) ── */
.wx-compact {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--ink2);
  margin-top: 3px;
}
.wx-temp-sm { font-weight: 600; color: var(--ink); }
.wx-desc-sm { font-size: 11px; }

/* Hide weather when Whole Trip tab is active */
#tab-all.active ~ * .wx-section,
#tab-all.active ~ * .wx-all-grid,
.wx-all-grid {
  display: none !important;
}

  </style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <h2>Private map</h2>
    <p>Enter the passcode to view.</p>
    <div class="gate-row">
      <input id="gateInput" type="password" placeholder="Passcode" />
      <button id="gateBtn">Unlock</button>
    </div>
    <div class="gate-error" id="gateError">Incorrect passcode.</div>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="trip-header">
      <p class="trip-title" id="tripTitle">Our Travels</p>
      <p class="trip-subtitle" id="tripSubtitle">Loading…</p>
    </div>
    <div class="timeline-wrap" id="timeline"></div>
  </aside>

  <main>
    <div id="map"></div>
    <div class="controls">
      <div class="ctrl-card">
        <div class="mode-tabs">
          <button class="mode-tab" id="tab-today"  onclick="setMode('today')">Today</button>
          <button class="mode-tab" id="tab-select" onclick="setMode('select')">Select date</button>
          <button class="mode-tab" id="tab-all"    onclick="setMode('all')">Whole trip</button>
        </div>
        <div class="ctrl-body" id="ctrlBody"></div>
      </div>
    </div>
  </main>
</div>

<script>
  /***********************************************************************
   * CONFIG — edit these
   ***********************************************************************/
  const PASSCODE = "";
  const ITINERARY_JSON_URL = "itinerary.json";

  const EMBEDDED_ITINERARY = {
    title: "Leah & Co. — 2026 Adventure",
    subtitle: "Following the sun ✈️",
    stops: [
      { id: "london",    name: "London",    country: "UK",       start: "2026-03-01", end: "2026-03-14", lat: 51.5074,  lng: -0.1278,  note: "Base camp before the adventure begins." },
      { id: "lisbon",    name: "Lisbon",    country: "Portugal", start: "2026-03-15", end: "2026-03-22", lat: 38.7169,  lng: -9.1399,  note: "Pastéis de nata every morning." },
      { id: "seville",   name: "Seville",   country: "Spain",    start: "2026-03-23", end: "2026-03-30", lat: 37.3891,  lng: -5.9845,  note: "Flamenco and orange trees." },
      { id: "marrakech", name: "Marrakech", country: "Morocco",  start: "2026-03-31", end: null,          lat: 31.6295,  lng: -7.9811,  note: "The medina awaits." }
    ]
  };

  /***********************************************************************
   * UTILITIES
   ***********************************************************************/
  function parseDateUTC(s) {
    const [y, m, d] = s.split("-").map(Number);
    return new Date(Date.UTC(y, m - 1, d));
  }
  function todayUTC() {
    const n = new Date();
    return new Date(Date.UTC(n.getFullYear(), n.getMonth(), n.getDate()));
  }
  function toYMD(d) {
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  }
  function todayStr() { return toYMD(todayUTC()); }
  function fmtDate(s) {
    if (!s) return "onwards";
    return parseDateUTC(s).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric", timeZone:"UTC" });
  }
  function fmtRange(s, e) {
    return e ? `${fmtDate(s)} → ${fmtDate(e)}` : `From ${fmtDate(s)}`;
  }
  function esc(str) {
    return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
  }

  // Find which stop covers a date.
  // null end = covered until next stop's start date (exclusive), or indefinitely if last.
  function stopForDate(dateStr) {
    const t = parseDateUTC(dateStr).getTime();
    for (let i = 0; i < stops.length; i++) {
      const s = stops[i];
      const start = parseDateUTC(s.start).getTime();
      let end;
      if (s.end) {
        end = parseDateUTC(s.end).getTime();
      } else {
        const next = stops[i + 1];
        end = next ? parseDateUTC(next.start).getTime() - 1 : Infinity;
      }
      if (t >= start && t <= end) return s;
    }
    return null;
  }

  function nextStopAfter(stop) {
    if (!stop) return stops[0] || null;
    const idx = stops.findIndex(s => s.id === stop.id);
    return stops[idx + 1] || null;
  }

  function tripBounds() {
    if (!stops.length) return null;
    const first = stops[0];
    const last  = stops[stops.length - 1];
    const minD  = parseDateUTC(first.start);
    // If last stop has no end, treat as at least a year from its start
    const maxD  = last.end
      ? parseDateUTC(last.end)
      : new Date(parseDateUTC(last.start).getTime() + 365*24*60*60*1000);
    return { min: minD, max: maxD };
  }

  function todayInTrip() {
    const b = tripBounds();
    if (!b) return false;
    const t = todayUTC().getTime();
    return t >= b.min.getTime() && t <= b.max.getTime();
  }

  /***********************************************************************
   * STATE
   ***********************************************************************/
  let itinerary = null;
  let stops = [];
  let mode = "today";
  let selectedDate = todayStr();
  let map = null;
  let markersById = new Map();
  let routeLine = null;

  /***********************************************************************
   * DATA
   ***********************************************************************/
  async function loadItinerary() {
    try {
      if (!ITINERARY_JSON_URL) throw 0;
      const res = await fetch(ITINERARY_JSON_URL, { cache: "no-store" });
      if (!res.ok) throw 0;
      const json = await res.json();
      if (!json || !Array.isArray(json.stops)) throw 0;
      return json;
    } catch { return EMBEDDED_ITINERARY; }
  }

  /***********************************************************************
   * GATE
   ***********************************************************************/
  function setupGate() {
    if (!PASSCODE) return;
    const gate = document.getElementById("gate");
    gate.style.display = "grid";
    const inp = document.getElementById("gateInput");
    const btn = document.getElementById("gateBtn");
    const err = document.getElementById("gateError");
    const unlock = () => {
      if (inp.value === PASSCODE) gate.style.display = "none";
      else err.style.display = "block";
    };
    btn.addEventListener("click", unlock);
    inp.addEventListener("keydown", e => e.key === "Enter" && unlock());
  }

  /***********************************************************************
   * MAP
   ***********************************************************************/
  function initMap() {
    map = L.map("map", { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);
  }

  function buildPins() {
    markersById.forEach(m => m.remove());
    markersById.clear();
    if (routeLine) { routeLine.remove(); routeLine = null; }

    const latlngs = [];
    const used = new Set();
    for (const stop of stops) {
      const ll = [stop.lat, stop.lng];
      latlngs.push(ll);
      const marker = L.marker(ll).addTo(map);
      marker.on("click", () => {
        if (mode === "all") return;
        selectedDate = stop.start;
        setMode("select");
      });
      marker.bindPopup(popupHtml(stop), { closeButton: true });
      markersById.set(stop.id, marker);
      const key = `${stop.lat.toFixed(5)},${stop.lng.toFixed(5)}`;
      if (used.has(key)) {
        const j = 0.005 * (Math.random() - 0.5);
        marker.setLatLng([stop.lat + j, stop.lng + j]);
      }
      used.add(key);
    }
    routeLine = L.polyline(latlngs, { weight: 2.5, opacity: 0.6, color: "#c8692a" }).addTo(map);
  }

  function popupHtml(stop) {
    const note = stop.note ? `<div style="margin-top:5px;font-size:12px;opacity:.8;">${esc(stop.note)}</div>` : "";
    return `<div style="font-family:'DM Sans',system-ui;min-width:150px;">
      <div style="font-weight:700;font-size:14px;">${esc(stop.name)}${stop.country ? `<span style="font-weight:400;opacity:.7;">, ${esc(stop.country)}</span>` : ""}</div>
      <div style="font-size:12px;opacity:.65;margin-top:2px;">${fmtRange(stop.start, stop.end)}</div>
      ${note}
    </div>`;
  }

  function focusAll() {
    const group = L.featureGroup([...markersById.values()]);
    if (!group.getLayers().length) return;
    map.fitBounds(group.getBounds().pad(0.25));
  }

  function focusStop(stop) {
    const m = markersById.get(stop.id);
    if (!m) return;
    map.flyTo(m.getLatLng(), 9, { duration: 0.9 });
    if (window.innerWidth > 860) m.openPopup();
  }

  /***********************************************************************
   * SIDEBAR TIMELINE
   ***********************************************************************/
  function renderTimeline(activeId) {
    const el = document.getElementById("timeline");
    if (!el) return;
    el.innerHTML = "";
    stops.forEach((stop, i) => {
      const div = document.createElement("div");
      div.className = "stop-item" + (stop.id === activeId ? " active" : "");

      const row = document.createElement("div");
      row.className = "stop-row";
      const name = document.createElement("span");
      name.className = "stop-name";
      name.textContent = stop.name;
      const dates = document.createElement("span");
      dates.className = "stop-dates";
      dates.textContent = fmtRange(stop.start, stop.end);
      row.appendChild(name);
      row.appendChild(dates);
      div.appendChild(row);

      if (stop.note) {
        const note = document.createElement("div");
        note.className = "stop-note";
        note.textContent = stop.note;
        div.appendChild(note);
      }

      div.addEventListener("click", () => {
        selectedDate = stop.start;
        setMode("select");
      });

      el.appendChild(div);
      if (i < stops.length - 1) {
        const hr = document.createElement("div");
        hr.className = "stop-divider";
        el.appendChild(hr);
      }
    });
  }

  /***********************************************************************
   * PANELS
   ***********************************************************************/
  function renderTodayPanel(body) {
    const stop = stopForDate(todayStr());
    const next = nextStopAfter(stop);

    if (!stop) {
      body.innerHTML = `<p class="no-match">Today is outside the trip dates.<br>Try <em>Select date</em> or <em>Whole trip</em>.</p>`;
      renderTimeline(null);
      return;
    }

    let html = `
      <div class="info-location">${esc(stop.name)}</div>
      <div class="info-meta">${stop.country ? esc(stop.country)+" &middot; " : ""}${fmtRange(stop.start, stop.end)}</div>
      ${stop.note ? `<div class="info-note">${esc(stop.note)}</div>` : ""}
    `;
    if (next) {
      html += `
        <div class="next-block">
          <div class="next-label">Next stop</div>
          <div class="next-name">${esc(next.name)}</div>
          <div class="next-dates">${next.country ? esc(next.country)+" &middot; " : ""}From ${fmtDate(next.start)}</div>
        </div>
      `;
    }
    body.innerHTML = html;
    renderTimeline(stop.id);
    focusStop(stop);
  }

  function renderSelectPanel(body) {
    const b = tripBounds();
    const minStr = b ? toYMD(b.min) : "";
    const maxStr = b ? toYMD(b.max) : "";

    body.innerHTML = `
      <div class="date-nav">
        <button class="arrow-btn" id="prevDay">&#8249;</button>
        <input type="date" id="datePicker"
               value="${esc(selectedDate)}"
               min="${esc(minStr)}"
               max="${esc(maxStr)}" />
        <button class="arrow-btn" id="nextDay">&#8250;</button>
      </div>
      <div id="selectInfo"></div>
    `;

    document.getElementById("prevDay").addEventListener("click", () => shiftDay(-1));
    document.getElementById("nextDay").addEventListener("click", () => shiftDay(+1));
    document.getElementById("datePicker").addEventListener("change", e => {
      selectedDate = e.target.value;
      updateSelectInfo();
    });

    updateSelectInfo();
  }

  function updateSelectInfo() {
    const el = document.getElementById("selectInfo");
    if (!el) return;
    const stop = stopForDate(selectedDate);

    if (!stop) {
      el.innerHTML = `<p class="no-match">No stop found for <strong>${esc(selectedDate)}</strong>.<br>Try a different date.</p>`;
      renderTimeline(null);
      return;
    }

    el.innerHTML = `
      <div class="info-location">${esc(stop.name)}</div>
      <div class="info-meta">${stop.country ? esc(stop.country)+" &middot; " : ""}${fmtRange(stop.start, stop.end)}</div>
      ${stop.note ? `<div class="info-note">${esc(stop.note)}</div>` : ""}
    `;
    renderTimeline(stop.id);
    focusStop(stop);
  }

  function shiftDay(delta) {
    if (!selectedDate) return;
    const d = parseDateUTC(selectedDate);
    d.setUTCDate(d.getUTCDate() + delta);
    const b = tripBounds();
    if (b) {
      const t = Math.max(b.min.getTime(), Math.min(b.max.getTime(), d.getTime()));
      selectedDate = toYMD(new Date(t));
    } else {
      selectedDate = toYMD(d);
    }
    const picker = document.getElementById("datePicker");
    if (picker) picker.value = selectedDate;
    updateSelectInfo();
  }

  function renderAllPanel(body) {
    const first = stops[0];
    const last  = stops[stops.length - 1];
    const count = stops.length;
    body.innerHTML = `
      <div class="whole-info">
        <strong>${count} stop${count !== 1 ? "s" : ""}</strong> across the full journey.
        ${first ? `<br><span>From ${fmtDate(first.start)}${last && last.end ? " to " + fmtDate(last.end) : ""}</span>` : ""}
      </div>
    `;
    renderTimeline(null);
    focusAll();
  }

  /***********************************************************************
   * MODE
   ***********************************************************************/
  function setMode(newMode) {
    mode = newMode;
    ["today","select","all"].forEach(m => {
      document.getElementById(`tab-${m}`).classList.toggle("active", mode === m);
    });
    const body = document.getElementById("ctrlBody");
    if (mode === "today")        renderTodayPanel(body);
    else if (mode === "select")  renderSelectPanel(body);
    else                         renderAllPanel(body);
  }

  /***********************************************************************
   * INIT
   ***********************************************************************/
  async function main() {
    setupGate();
    itinerary = await loadItinerary();
    stops = [...(itinerary.stops || [])].sort((a, b) => a.start.localeCompare(b.start));

    document.getElementById("tripTitle").textContent    = itinerary.title    || "Our Travels";
    document.getElementById("tripSubtitle").textContent = itinerary.subtitle || "";

    initMap();
    buildPins();

    // Default mode: Today if within trip, otherwise Select (defaulting to first stop)
    if (todayInTrip()) {
      mode = "today";
    } else {
      mode = "select";
      selectedDate = stops[0]?.start || todayStr();
    }

    setMode(mode);
  }

  main();
</script>

<script>
/**
 * WEATHER MODULE — drop this <script> block just before </body>
 * in your Travel Map HTML, right after the existing <script> closes.
 *
 * Uses Open-Meteo (https://open-meteo.com) — free, no API key needed.
 *
 * Also paste the CSS block (below) into your existing <style> tag.
 *
 * ─────────────────────────────────────────────────────────────────
 * HOW IT WORKS
 *  • "Today" panel  → shows current conditions + today's high/low
 *  • "Select date"  → shows conditions for the selected date
 *                      (if within 16-day forecast window, else "too far ahead")
 *  • "Whole trip"   → shows a compact weather summary per stop
 *                      (current for current/past stops, arrival-day for future)
 * ─────────────────────────────────────────────────────────────────
 */

/* ───── WMO weather-code → description + emoji ───── */
const WMO = {
  0:  ["Clear sky",          "☀️"],
  1:  ["Mainly clear",       "🌤️"],
  2:  ["Partly cloudy",      "⛅"],
  3:  ["Overcast",           "☁️"],
  45: ["Foggy",              "🌫️"],
  48: ["Icy fog",            "🌫️"],
  51: ["Light drizzle",      "🌦️"],
  53: ["Drizzle",            "🌦️"],
  55: ["Heavy drizzle",      "🌧️"],
  61: ["Slight rain",        "🌧️"],
  63: ["Rain",               "🌧️"],
  65: ["Heavy rain",         "🌧️"],
  71: ["Slight snow",        "🌨️"],
  73: ["Snow",               "❄️"],
  75: ["Heavy snow",         "❄️"],
  77: ["Snow grains",        "🌨️"],
  80: ["Showers",            "🌦️"],
  81: ["Heavy showers",      "🌧️"],
  82: ["Violent showers",    "⛈️"],
  85: ["Snow showers",       "🌨️"],
  86: ["Heavy snow showers", "❄️"],
  95: ["Thunderstorm",       "⛈️"],
  96: ["Thunderstorm + hail","⛈️"],
  99: ["Thunderstorm + hail","⛈️"],
};

function wmoLabel(code) {
  const entry = WMO[code] || ["Unknown", "🌡️"];
  return { desc: entry[0], emoji: entry[1] };
}

/* ───── Low-level fetch ───── */
async function fetchWeather({ lat, lng, dateStr, wantCurrent = false }) {
  const base = "https://api.open-meteo.com/v1/forecast";
  const params = new URLSearchParams({
    latitude:  lat,
    longitude: lng,
    daily:     "temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum",
    timezone:  "auto",
    forecast_days: 16,
  });
  if (wantCurrent) {
    params.append("current_weather", "true");
  }
  const res = await fetch(`${base}?${params}`);
  if (!res.ok) throw new Error("Weather fetch failed");
  const data = await res.json();

  const daily = data.daily;
  const idx   = daily.time.indexOf(dateStr);

  let dayData = null;
  if (idx !== -1) {
    dayData = {
      high:   Math.round(daily.temperature_2m_max[idx]),
      low:    Math.round(daily.temperature_2m_min[idx]),
      code:   daily.weathercode[idx],
      rain:   daily.precipitation_sum[idx],
    };
  }

  let current = null;
  if (wantCurrent && data.current_weather) {
    const cw = data.current_weather;
    current = {
      temp: Math.round(cw.temperature),
      code: cw.weathercode,
      wind: Math.round(cw.windspeed),
    };
  }

  return { dayData, current, availableDates: daily.time };
}

/* ───── Render helpers ───── */
function weatherHTML({ current = null, dayData = null, label = "", compact = false }) {
  if (!current && !dayData) {
    return `<div class="wx-wrap wx-empty">Weather unavailable</div>`;
  }

  if (compact) {
    // Used in "Whole trip" list
    const src   = dayData || current;
    const { emoji, desc } = wmoLabel(src.code);
    const temp  = dayData ? `${dayData.low}° – ${dayData.high}°` : `${current.temp}°`;
    return `
      <span class="wx-compact">
        <span class="wx-emoji">${emoji}</span>
        <span class="wx-temp-sm">${temp}C</span>
        <span class="wx-desc-sm">${desc}</span>
      </span>`;
  }

  let html = `<div class="wx-wrap">`;

  if (current) {
    const { emoji, desc } = wmoLabel(current.code);
    html += `
      <div class="wx-row">
        <span class="wx-badge">Now</span>
        <span class="wx-emoji">${emoji}</span>
        <span class="wx-temp">${current.temp}°C</span>
        <span class="wx-desc">${desc}</span>
        <span class="wx-wind">💨 ${current.wind} km/h</span>
      </div>`;
  }

  if (dayData) {
    const { emoji, desc } = wmoLabel(dayData.code);
    const badgeText = label || "Today";
    html += `
      <div class="wx-row">
        <span class="wx-badge wx-badge-day">${badgeText}</span>
        <span class="wx-emoji">${emoji}</span>
        <span class="wx-temp">${dayData.low}° – ${dayData.high}°C</span>
        <span class="wx-desc">${desc}</span>
        ${dayData.rain > 0 ? `<span class="wx-rain">🌧 ${dayData.rain} mm</span>` : ""}
      </div>`;
  }

  html += `</div>`;
  return html;
}

function weatherLoadingHTML() {
  return `<div class="wx-wrap wx-loading">
    <span class="wx-spinner"></span> Loading weather…
  </div>`;
}

function weatherTooFarHTML(dateStr) {
  return `<div class="wx-wrap wx-empty">
    📅 Forecast for <strong>${dateStr}</strong> not yet available (beyond 16-day window).
  </div>`;
}

/* ───── Inject weather into a panel ───── */
async function injectWeather(containerId, stop, dateStr, opts = {}) {
  const container = document.getElementById(containerId);
  if (!container) return;

  // Remove any existing weather block first
  const old = container.querySelector(".wx-section");
  if (old) old.remove();

  const section = document.createElement("div");
  section.className = "wx-section";
  section.innerHTML = weatherLoadingHTML();
  container.appendChild(section);

  const today    = todayStr();
  const isToday  = dateStr === today;

  try {
    // Is the date within the 16-day forecast window?
    // We'll find out after fetching (Open-Meteo returns available dates)
    const { dayData, current, availableDates } = await fetchWeather({
      lat: stop.lat,
      lng: stop.lng,
      dateStr,
      wantCurrent: opts.wantCurrent || isToday,
    });

    const dateInWindow = availableDates.includes(dateStr);

    if (!dateInWindow && !opts.wantCurrent) {
      section.innerHTML = weatherTooFarHTML(dateStr);
      return;
    }

    const label = isToday ? "Today" : `Arrival (${dateStr})`;
    section.innerHTML = weatherHTML({
      current:  opts.wantCurrent ? current : null,
      dayData:  dateInWindow ? dayData : null,
      label,
    });
  } catch (e) {
    section.innerHTML = `<div class="wx-wrap wx-empty">⚠️ Weather unavailable</div>`;
    console.warn("Weather error:", e);
  }
}

/* ────────────────────────────────────────────────────────────
 * PATCH the existing render functions
 * We monkey-patch renderTodayPanel, updateSelectInfo, and
 * renderAllPanel (whole-trip) to call weather after render.
 * ──────────────────────────────────────────────────────────── */

/* Save originals */
const _renderTodayPanel    = renderTodayPanel;
const _updateSelectInfo    = updateSelectInfo;

/* Patch renderTodayPanel */
window.renderTodayPanel = function(body) {
  _renderTodayPanel(body);
  const stop = stopForDate(todayStr());
  if (!stop) return;
  // Append weather below whatever the panel already rendered
  const infoEl = body;
  injectWeather_intoEl(infoEl, stop, todayStr(), { wantCurrent: true });
};

/* Patch updateSelectInfo */
window.updateSelectInfo = function() {
  _updateSelectInfo();
  // After the original runs, find the stop for selectedDate and inject
  const stop = stopForDate(selectedDate);
  if (!stop) return;
  const el = document.getElementById("selectInfo");
  if (!el) return;
  const isToday = selectedDate === todayStr();
  injectWeather_intoEl(el, stop, selectedDate, { wantCurrent: isToday });
};

/* Helper: append wx-section into a plain element (not by ID) */
async function injectWeather_intoEl(container, stop, dateStr, opts = {}) {
  const old = container.querySelector(".wx-section");
  if (old) old.remove();

  const section = document.createElement("div");
  section.className = "wx-section";
  section.innerHTML = weatherLoadingHTML();
  container.appendChild(section);

  const today   = todayStr();
  const isToday = dateStr === today;

  try {
    const { dayData, current, availableDates } = await fetchWeather({
      lat: stop.lat,
      lng: stop.lng,
      dateStr,
      wantCurrent: opts.wantCurrent || isToday,
    });

    const dateInWindow = availableDates.includes(dateStr);

    if (!dateInWindow && !opts.wantCurrent) {
      section.innerHTML = weatherTooFarHTML(dateStr);
      return;
    }

    const label = isToday ? "Today" : `Arrival (${dateStr})`;
    section.innerHTML = weatherHTML({
      current:  (opts.wantCurrent || isToday) ? current : null,
      dayData:  dateInWindow ? dayData : null,
      label,
    });
  } catch {
    section.innerHTML = `<div class="wx-wrap wx-empty">⚠️ Weather unavailable</div>`;
  }
}

/* ───── "Whole trip" panel: add weather per stop ───── */
/* We patch renderAllPanel which is called by setMode('all') */
/* If your original code has renderAllPanel, patch it; otherwise hook setMode */
const _origSetMode = setMode;
window.setMode = function(m) {
  _origSetMode(m);
  if (m === "all") {
    setTimeout(injectAllWeather, 50); // wait for DOM to render
  }
};

async function injectAllWeather() {
  // In "all" mode the ctrl body shows whole-trip info.
  // We append a compact per-stop weather grid.
  const body = document.getElementById("ctrlBody");
  if (!body) return;

  const old = body.querySelector(".wx-all-grid");
  if (old) old.remove();

  const grid = document.createElement("div");
  grid.className = "wx-all-grid";
  grid.innerHTML = `<div class="wx-all-title">Weather at each stop</div>` +
    stops.map(s => `
      <div class="wx-all-row" id="wx-all-${s.id}">
        <span class="wx-all-name">${s.name}</span>
        <span class="wx-spinner-sm"></span>
      </div>
    `).join("");
  body.appendChild(grid);

  for (const stop of stops) {
    const el = document.getElementById(`wx-all-${stop.id}`);
    if (!el) continue;
    try {
      // Show current weather if we're currently at this stop; else arrival day
      const isCurrentStop = stopForDate(todayStr())?.id === stop.id;
      const dateStr = isCurrentStop ? todayStr() : stop.start;

      const { dayData, current, availableDates } = await fetchWeather({
        lat: stop.lat,
        lng: stop.lng,
        dateStr,
        wantCurrent: isCurrentStop,
      });

      const dateInWindow = availableDates.includes(dateStr);
      const src = isCurrentStop ? current : (dateInWindow ? dayData : null);

      if (!src) {
        el.querySelector(".wx-spinner-sm").replaceWith(
          Object.assign(document.createElement("span"), {
            className: "wx-all-na",
            textContent: dateInWindow ? "No data" : "Too far ahead",
          })
        );
        continue;
      }

      const { emoji, desc } = wmoLabel(src.code);
      const temp = isCurrentStop
        ? `${src.temp}°C`
        : `${dayData.low}°–${dayData.high}°C`;

      el.querySelector(".wx-spinner-sm").replaceWith(
        Object.assign(document.createElement("span"), {
          className: "wx-all-data",
          innerHTML: `${emoji} <b>${temp}</b> <span>${desc}</span>`,
        })
      );
    } catch {
      const sp = el.querySelector(".wx-spinner-sm");
      if (sp) sp.replaceWith(
        Object.assign(document.createElement("span"), {
          className: "wx-all-na",
          textContent: "Unavailable",
        })
      );
    }
  }
}
</script>
</body>
</html>
